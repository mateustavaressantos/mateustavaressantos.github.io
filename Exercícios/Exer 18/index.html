<!DOCTYPE html>
<html lang="pt-br">

</head>
<body>

            <legend>Sexo:</legend>

            <input type="radio" name="sexo" id="fem"> <label for="fem">Feminino</label>
        </fieldset>

        <fieldset id="checkbox">
            <legend>Comida favorita:</legend>
            <input type="checkbox" name="sushi" id="comidSushi"> <label for="comidSushi">Sushi</label>
            <input type="checkbox" name="hamb" id="comidHamb"> <label for="comidHamb">Hambúrguer</label>
            <input type="checkbox" name="pizza" id="comidPizza"> <label for="comidPizza">Pizza</label>
            <input type="checkbox" name="brigad" id="comidBrigad"> <label for="comidBrigad">Brigadeiro</label>
            <input type="checkbox" name="beiji" id="comidBeiji"> <label for="comidBeiji">Beijinho</label>
        </fieldset>
    </form>
</body>
</html>
